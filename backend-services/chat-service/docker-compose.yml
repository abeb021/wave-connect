services:
  chat-service:
    build: .
    ports:
      - "8080:8080"
    environment:
      DB_HOST: db 
      DB_PORT: 5432
      DB_USER: user
      DB_PASSWORD: password 
      DB_NAME: messages
    depends_on:
      - db
       
  db:
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: messages
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d messages"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

volumes:
  postgres_data: