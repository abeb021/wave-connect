# Optional: copy .env.example to .env and set your own values.
# These defaults let it run without a .env file (dev only).
services:

  gateway:
    build:
      context: ./gateway-service
      dockerfile: Dockerfile
    environment:
      - JWT_SECRET=${JWT_SECRET}
      - AUTH_SERVICE_URL=${AUTH_SERVICE_URL}
      - CHAT_SERVICE_URL=${CHAT_SERVICE_URL}
      - FEED_SERVICE_URL=${FEED_SERVICE_URL}
      - PROFILE_SERVICE_URL=${PROFILE_SERVICE_URL}
    ports:
      - "8080:8080"
    networks:
      - wave-connect
    depends_on:
      - auth
      - chat
      - feed
      - profile
    restart: unless-stopped

  auth:
    build:
      context: ./auth-service
      dockerfile: Dockerfile
    environment:
      DB_HOST: auth_db
      DB_PORT: 5432
      DB_USER: ${DB_AUTH_USER}
      DB_PASSWORD: ${DB_AUTH_PASSWORD}
      DB_NAME: ${DB_AUTH_NAME}
      JWT_SECRET: ${JWT_SECRET}
    expose:
      - 8081
    networks:
      - wave-connect
    depends_on:
      auth_db:
        condition: service_healthy
    restart: unless-stopped

  auth_db:
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_USER: ${DB_AUTH_USER}
      POSTGRES_PASSWORD: ${DB_AUTH_PASSWORD}
      POSTGRES_DB: ${DB_AUTH_NAME}
    expose:
      - 5432
    networks:
      - wave-connect
    volumes:
      - postgres_data_auth:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"${DB_AUTH_USER}\" -d \"${DB_AUTH_NAME}\""]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  chat:
    build:
      context: ./chat-service
      dockerfile: Dockerfile
    environment:
      DB_HOST: chat_db
      DB_PORT: "5432"
      DB_USER: ${DB_CHAT_USER}
      DB_PASSWORD: ${DB_CHAT_PASSWORD}
      DB_NAME: ${DB_CHAT_NAME}
    expose:
      - 8082
    networks:
      - wave-connect
    depends_on:
      chat_db:
        condition: service_healthy
    restart: unless-stopped

  chat_db:
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_USER: ${DB_CHAT_USER}
      POSTGRES_PASSWORD: ${DB_CHAT_PASSWORD}
      POSTGRES_DB: ${DB_CHAT_NAME}
    expose:
      - 5432
    networks:
      - wave-connect
    volumes:
      - postgres_data_chat:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"${DB_CHAT_USER}\" -d \"${DB_CHAT_NAME}\""]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  feed:
    build:
      context: ./feed-service
      dockerfile: Dockerfile
    environment:
      DB_HOST: feed_db
      DB_PORT: "5432"
      DB_USER: ${DB_FEED_USER}
      DB_PASSWORD: ${DB_FEED_PASSWORD}
      DB_NAME: ${DB_FEED_NAME}
      KAFKA_BROKER: ${KAFKA_BROKER}
    expose:
      - 8083
    networks:
      - wave-connect
    depends_on:
      feed_db:
        condition: service_healthy
    restart: unless-stopped

  feed_db:
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_USER: ${DB_FEED_USER}
      POSTGRES_PASSWORD: ${DB_FEED_PASSWORD}
      POSTGRES_DB: ${DB_FEED_NAME}
    expose:
      - 5432
    networks:
      - wave-connect
    volumes:
      - postgres_data_feed:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"${DB_FEED_USER}\" -d \"${DB_FEED_NAME}\""]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
      
  profile:
    build:
      context: ./profile-service
      dockerfile: Dockerfile
    environment:
      DB_HOST: profile_db
      DB_PORT: "5432"
      DB_USER: ${DB_PROFILE_USER}
      DB_PASSWORD: ${DB_PROFILE_PASSWORD}
      DB_NAME: ${DB_PROFILE_NAME}
      KAFKA_BROKER: ${KAFKA_BROKER}
    expose:
      - 8084
    networks:
      - wave-connect
    depends_on:
      profile_db:
        condition: service_healthy
    restart: unless-stopped

  profile_db:
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_USER: ${DB_PROFILE_USER}
      POSTGRES_PASSWORD: ${DB_PROFILE_PASSWORD}
      POSTGRES_DB: ${DB_PROFILE_NAME}
    expose:
      - 5432
    networks:
      - wave-connect
    volumes:
      - postgres_data_profile:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"${DB_PROFILE_USER}\" -d \"${DB_PROFILE_NAME}\""]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
  kafka:
    image: apache/kafka:latest
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    networks:
      - wave-connect

networks:
  wave-connect:
    driver: bridge

volumes:
  postgres_data_auth:
  postgres_data_feed:
  postgres_data_chat:
  postgres_data_profile: