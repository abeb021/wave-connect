# Optional: copy .env.example to .env and set your own values.
# These defaults let it run without a .env file (dev only).
services:

  gateway:
    build:
      context: ./gateway-service
      dockerfile: Dockerfile
    environment:
      - JWT_SECRET=${JWT_SECRET}
      - AUTH_SERVICE_URL=${AUTH_SERVICE_URL}
      - CHAT_SERVICE_URL=${CHAT_SERVICE_URL}
      - FEED_SERVICE_URL=${FEED_SERVICE_URL}
    ports:
      - "8080:8080"
    networks:
      - wave-connect
    depends_on:
      - auth
      - chat
      - feed
    restart: unless-stopped

  auth:
    build:
      context: ./auth-service
      dockerfile: Dockerfile
    environment:
      DB_HOST: auth_db
      DB_PORT: 5432
      DB_USER: ${DB_AUTH_USER}
      DB_PASSWORD: ${DB_AUTH_PASSWORD}
      DB_NAME: ${DB_AUTH_NAME}
      JWT_SECRET: ${JWT_SECRET}
    expose:
      - 8081
    ports:
      - "8081:8081"
    networks:
      - wave-connect
    depends_on:
      auth_db:
        condition: service_healthy
    restart: unless-stopped

  auth_db:
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_USER: ${DB_AUTH_USER}
      POSTGRES_PASSWORD: ${DB_AUTH_PASSWORD}
      POSTGRES_DB: ${DB_AUTH_NAME}
    expose:
      - 5432
    networks:
      - wave-connect
    volumes:
      - postgres_data_auth:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"${DB_AUTH_USER}\" -d \"${DB_AUTH_NAME}\""]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  chat:
    build:
      context: ./chat-service
      dockerfile: Dockerfile
    environment:
      DB_HOST: chat_db
      DB_PORT: "5432"
      DB_USER: ${DB_CHAT_USER}
      DB_PASSWORD: ${DB_CHAT_PASSWORD}
      DB_NAME: ${DB_CHAT_NAME}
    expose:
      - 8082
    networks:
      - wave-connect
    depends_on:
      chat_db:
        condition: service_healthy
    restart: unless-stopped

  chat_db:
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_USER: ${DB_CHAT_USER}
      POSTGRES_PASSWORD: ${DB_CHAT_PASSWORD}
      POSTGRES_DB: ${DB_CHAT_NAME}
    expose:
      - 5432
    networks:
      - wave-connect
    volumes:
      - postgres_data_chat:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"${DB_CHAT_USER}\" -d \"${DB_CHAT_NAME}\""]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  feed:
    build:
      context: ./feed-service
      dockerfile: Dockerfile
    environment:
      DB_HOST: feed_db
      DB_PORT: "5432"
      DB_USER: ${DB_FEED_USER}
      DB_PASSWORD: ${DB_FEED_PASSWORD}
      DB_NAME: ${DB_FEED_NAME}
    expose:
      - 8083
    networks:
      - wave-connect
    depends_on:
      feed_db:
        condition: service_healthy
    restart: unless-stopped

  feed_db:
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_USER: ${DB_FEED_USER}
      POSTGRES_PASSWORD: ${DB_FEED_PASSWORD}
      POSTGRES_DB: ${DB_FEED_NAME}
    expose:
      - 5432
    networks:
      - wave-connect
    volumes:
      - postgres_data_feed:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"${DB_FEED_USER}\" -d \"${DB_FEED_NAME}\""]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s


networks:
  wave-connect:
    driver: bridge

volumes:
  postgres_data_auth:
  postgres_data_feed:
  postgres_data_chat: